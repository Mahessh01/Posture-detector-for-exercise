<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pose Detector</title>

    <!-- p5.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.min.js"></script>

    <!-- ml5.js -->
    <script src="https://unpkg.com/ml5@0.6.0/dist/ml5.min.js"></script>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#0d0d0d;
            color:white;
            font-family:Arial, Helvetica, sans-serif;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .container{
            width:100%;
            display:flex;
            flex-direction:column;
            align-items:center;
        }

        h1{
            font-size:52px;
            letter-spacing:3px;
            margin-bottom:35px;
            color:white;
        }

        #canvas-container{
            width:760px;
            height:570px;
            border:5px solid #8a2be2;
            border-radius:25px;
            overflow:hidden;
            box-shadow:0 0 30px rgba(138,43,226,.5);
        }

        canvas{
            display:block;
        }

        .info{
            margin-top:25px;
            padding:15px 30px;
            border:2px solid #444;
            border-radius:15px;
            color:#ddd;
            font-size:22px;
            background:#1a1a1a;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>POSE DETECTOR</h1>

    <div id="canvas-container"></div>

    <div class="info">
        Ensure your full body is visible in the frame
    </div>

</div>

<script src="sketch.js"></script>

</body>
</html>
