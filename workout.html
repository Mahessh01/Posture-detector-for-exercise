<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Workout Session</title>

    <link rel="stylesheet" href="css/workout.css">

    <!-- p5.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.min.js"></script>

    <!-- ml5.js -->
    <script src="https://unpkg.com/ml5@0.6.0/dist/ml5.min.js"></script>

</head>

<body>

    <div class="background"></div>

    <div class="container">

        <header>

            <div>

                <h1>AI Fitness Trainer</h1>

                <p id="exercise-name">
                    Loading Exercise...
                </p>

            </div>

            <button id="endWorkout">

                End Workout

            </button>

        </header>

        <main class="workout-layout">

            <!-- ========================= -->
            <!-- Camera -->
            <!-- ========================= -->

            <section class="camera-panel">

                <div id="canvas-container"></div>

            </section>

            <!-- ========================= -->
            <!-- Dashboard -->
            <!-- ========================= -->

            <aside class="dashboard">

                <div class="card">

                    <h3>Status</h3>

                    <p id="status">

                        READY

                    </p>

                </div>

                <div class="card">

                    <h3>Repetitions</h3>

                    <p id="reps">

                        0

                    </p>

                </div>

                <div class="card">
                    <h3>Angle</h3>
                    <p id="angle">0°</p>
                </div>

                <div class="card">

                    <h3>Form Score</h3>

                    <p id="score">

                        100%

                    </p>

                </div>

                <div class="card feedback-card">

                    <h3>AI Feedback</h3>

                    <p id="feedback">

                        Stand in front of the camera.

                    </p>

                </div>

            </aside>

        </main>

    </div>

    <!-- ========================= -->
    <!-- Exercise Loader -->
    <!-- ========================= -->

    <script src="js/exercisemanager.js"></script>
    <script src="js/pose.js"></script>

    <script src="js/exercises.js"></script>

    <script src="js/exercises/bicep.js"></script>
    <script src="js/exercises/squat.js"></script>
    <script src="js/exercises/pushup.js"></script>
    <script src="js/exercises/plank.js"></script>
    <script src="js/exercises/shoulderpress.js"></script>

    <script src="js/sketch.js"></script>

    <script src="js/app.js"></script>

</body>

</html>
