<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Split Layout</title>
<style>
body{
margin:0;
display:flex;
height:100vh;
font-family:Arial;
}
.left{
flex:1;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
font-size:40px;
}
.right{
flex:1;
background:#f8fafc;
display:flex;
justify-content:center;
align-items:center;
}
.box{
width:300px;
padding:30px;
background:white;
box-shadow:0 10px 25px rgba(0,0,0,.2);
text-align:center;
border-radius:15px;
}
input{
width:100%;
padding:10px;
margin:10px 0;
}
button{
padding:10px 20px;
background:#0f172a;
color:white;
border:none;
cursor:pointer;
}
</style>
</head>
<body>

<div class="left">
HELLO
</div>

<div class="right">
<div class="box">
<h2>Login</h2>
<input type="text" placeholder="Username">
<input type="password" placeholder="Password">
<button>Login</button>
</div>
</div>

</body>
</html>
