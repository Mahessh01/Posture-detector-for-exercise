<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Card</title>
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}
.card{
background:white;
padding:40px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,.2);
text-align:center;
width:300px;
}
button{
padding:10px 20px;
border:none;
background:#0077ff;
color:white;
border-radius:8px;
cursor:pointer;
}
button:hover{
background:#0059c9;
}
</style>
</head>
<body>

<div class="card">
<h1>Welcome</h1>
<p>This is a modern card layout.</p>
<button>Explore</button>
</div>

</body>
</html>
