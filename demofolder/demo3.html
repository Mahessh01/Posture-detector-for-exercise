<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<style>
body{
margin:0;
display:flex;
font-family:Arial;
}
.sidebar{
width:220px;
background:#222;
height:100vh;
color:white;
padding:20px;
}
.sidebar h2{
text-align:center;
}
.sidebar ul{
list-style:none;
padding:0;
}
.sidebar li{
padding:15px 0;
border-bottom:1px solid #444;
}
.main{
flex:1;
padding:30px;
background:#eee;
}
.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
}
</style>
</head>
<body>

<div class="sidebar">
<h2>Dashboard</h2>
<ul>
<li>Home</li>
<li>Analytics</li>
<li>Reports</li>
<li>Settings</li>
</ul>
</div>

<div class="main">
<div class="card">
<h2>Statistics</h2>
<p>Total Users: 1,250</p>
</div>

<div class="card">
<h2>Revenue</h2>
<p>$15,000</p>
</div>
</div>

</body>
</html>
